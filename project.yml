name: Nursemind
options:
  bundleIdPrefix: app.nursemind
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "LRDHWBMA87"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "11"

packages:
  NursemindCore:
    path: Packages/NursemindCore

targets:
  Nursemind:
    type: application
    platform: iOS
    sources:
      - path: Nursemind
    dependencies:
      - package: NursemindCore
    info:
      path: Nursemind/Info.plist
      properties:
        CFBundleDisplayName: NurseMind
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        # Skips the export-compliance question on every upload. NurseMind
        # uses only iOS's standard HTTPS / TLS — qualifies for the
        # standard encryption exemption per Apple's docs.
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: "NurseMind uses the microphone so you can ask the AI questions by voice. Audio is transcribed entirely on your device and never sent to a server."
        NSSpeechRecognitionUsageDescription: "NurseMind transcribes your speech into text so the AI can answer your question. Recognition runs on your device — no audio leaves it."
        NSUserTrackingUsageDescription: "Allowing tracking helps us measure which ads bring nurses to NurseMind so we can keep reaching more of you. No clinical, account, or personal information is ever shared."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            api.anthropic.com:
              NSIncludesSubdomains: true
              NSExceptionRequiresForwardSecrecy: true
              NSExceptionMinimumTLSVersion: TLSv1.2
    entitlements:
      path: Nursemind/Nursemind.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.nursemind.ios
        # iPhone-only ("1"). Going universal requires iPad-specific
        # screenshots in App Store metadata. The custom BottomTabBar +
        # per-tab maxWidth caps work fine on iPhone (cap > device width =
        # no-op) and stay in place for a future universal expansion.
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Nursemind/Nursemind.entitlements
